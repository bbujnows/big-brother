name: Scrape BB28 Scores

on:
  schedule:
    # Runs at 2am ET (6am UTC) daily during season — catches Wed/Thu/Sun episodes
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "bb28-bot"
          git config user.email "bot@bb28fantasy.local"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update scores [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
