<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BB28 Fantasy League</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">BIG BROTHER 28</a>
    <a href="index.html" class="active">Leaderboard</a>
    <a href="draft.html">Draft</a>
    <a href="players.html">Players</a>
    <a href="log.html">Episode Log</a>
    <a href="admin.html" class="admin-link">⚙ Admin</a>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="bb-eye">
      <svg viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="roofMetal" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ddeeff"/>
            <stop offset="20%"  stop-color="#88bbff"/>
            <stop offset="58%"  stop-color="#1155cc"/>
            <stop offset="100%" stop-color="#001d77"/>
          </linearGradient>
          <linearGradient id="slabMetal" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#cce4ff"/>
            <stop offset="30%"  stop-color="#6699dd"/>
            <stop offset="100%" stop-color="#001166"/>
          </linearGradient>
          <linearGradient id="chromeTxt" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ffffff"/>
            <stop offset="18%"  stop-color="#cce6ff"/>
            <stop offset="55%"  stop-color="#3388ee"/>
            <stop offset="85%"  stop-color="#1144bb"/>
            <stop offset="100%" stop-color="#003399"/>
          </linearGradient>
          <filter id="rfGlow" x="-12%" y="-30%" width="124%" height="180%">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feFlood flood-color="#1a7bff" flood-opacity="0.55" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="cb"/>
            <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="txGlow" x="-4%" y="-20%" width="108%" height="160%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feFlood flood-color="#4499ff" flood-opacity="0.4" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="cb"/>
            <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Roof peak triangle -->
        <polygon points="180,4 356,58 4,58" fill="url(#roofMetal)" filter="url(#rfGlow)"/>
        <!-- White edge highlights -->
        <line x1="180" y1="5" x2="354" y2="57" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="180" y1="5" x2="6" y2="57" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Horizontal slab / overhang -->
        <rect x="3" y="55" width="354" height="22" rx="3" fill="url(#slabMetal)" filter="url(#rfGlow)"/>
        <!-- Bright highlight on top edge of slab -->
        <rect x="4" y="55" width="352" height="4" rx="2" fill="rgba(255,255,255,0.72)"/>
        <!-- Deep shadow strip below slab -->
        <rect x="9" y="74" width="342" height="6" rx="2" fill="rgba(0,10,40,0.7)"/>

        <!-- BIG BROTHER chrome text -->
        <text x="180" y="138"
              text-anchor="middle"
              font-family="'Bebas Neue', Impact, 'Arial Black', sans-serif"
              font-size="66" font-weight="900" letter-spacing="5"
              fill="url(#chromeTxt)" filter="url(#txGlow)">BIG BROTHER</text>
      </svg>
    </div>
    <span class="hero-eyebrow">Season 28 · Fantasy League</span>
    <h1 class="hero-title">
      <span class="fantasy">Fantasy Draft</span>
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-sub" id="hero-sub">Loading...</p>
  </div>

  <main class="inner">
    <div id="owner-grid" class="owner-grid"></div>

    <div id="countdown-wrap"></div>

    <div id="hg-table-section">
      <div class="section-label">All Players</div>
      <div class="card hg-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Houseguest</th>
              <th>Owner</th>
              <th>Status</th>
              <th style="text-align:right">Points</th>
            </tr>
          </thead>
          <tbody id="hg-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Scoring System</div>
    <div id="scoring-grid" class="scoring-grid"></div>
  </main>

  <script src="app.js"></script>
  <script>
    const rankEmoji = ['🥇','🥈','🥉','4️⃣'];

    async function init() {
      const data = await loadData();
      const ownerScores = computeOwnerScores(data);
      const ranked = [...data.owners].sort((a,b) => (ownerScores[b.id]||0) - (ownerScores[a.id]||0));

      // Hero subtitle
      const heroSub = document.getElementById('hero-sub');
      if (data.currentWeek === 0) {
        heroSub.textContent = 'Premieres July 9, 2026 · Cast to be announced';
      } else {
        heroSub.textContent = `Week ${data.currentWeek} · Last updated ${data.lastUpdated}`;
      }

      // Owner cards
      const grid = document.getElementById('owner-grid');
      ranked.forEach((owner, i) => {
        const score = ownerScores[owner.id] || 0;
        const players = data.houseguests.filter(h => h.ownerId === owner.id);
        const card = document.createElement('div');
        card.className = `owner-card rank-${i+1}`;
        card.style.setProperty('--owner-color', owner.color);
        card.innerHTML = `
          <div class="owner-card-top">
            <div>
              <div class="owner-name">${owner.name}</div>
            </div>
            <div class="owner-rank-badge">${rankEmoji[i]}</div>
          </div>
          <div class="owner-score">${score}<span> pts</span></div>
          <div class="owner-players">
            ${players.length
              ? players.map(p => `<span class="player-pill ${p.status==='evicted'?'evicted':''}">${p.name}</span>`).join('')
              : '<span class="player-pill">No players yet</span>'}
          </div>`;
        grid.appendChild(card);
      });

      // Countdown
      if (data.currentWeek === 0) {
        const wrap = document.getElementById('countdown-wrap');
        const premiere = new Date('2026-07-09T20:00:00');
        function renderCountdown() {
          const diff = premiere - new Date();
          if (diff <= 0) { wrap.innerHTML = ''; return; }
          const d = Math.floor(diff/86400000);
          const h = Math.floor((diff%86400000)/3600000);
          const m = Math.floor((diff%3600000)/60000);
          const s = Math.floor((diff%60000)/1000);
          wrap.innerHTML = `
            <p class="section-label" style="justify-content:center;margin-bottom:16px;">Time Until Premiere</p>
            <div class="countdown">
              <div class="countdown-unit"><div class="countdown-num">${d}</div><div class="countdown-label">Days</div></div>
              <div class="countdown-unit"><div class="countdown-num">${String(h).padStart(2,'0')}</div><div class="countdown-label">Hours</div></div>
              <div class="countdown-unit"><div class="countdown-num">${String(m).padStart(2,'0')}</div><div class="countdown-label">Min</div></div>
              <div class="countdown-unit"><div class="countdown-num">${String(s).padStart(2,'0')}</div><div class="countdown-label">Sec</div></div>
            </div>`;
        }
        renderCountdown();
        setInterval(renderCountdown, 1000);
      }

      // Houseguests table
      const tbody = document.getElementById('hg-tbody');
      if (data.houseguests.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:36px;color:var(--muted);font-weight:600;">Cast not yet announced — check back soon!</td></tr>`;
      } else {
        const sorted = [...data.houseguests].sort((a,b) => computeGuestScore(b) - computeGuestScore(a));
        sorted.forEach(hg => {
          const owner = data.owners.find(o => o.id === hg.ownerId);
          const pts = computeGuestScore(hg);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${hg.name}</strong></td>
            <td>
              ${owner
                ? `<span class="owner-dot" style="background:${owner.color}"></span>${owner.name}`
                : '<span style="color:var(--muted)">Undrafted</span>'}
            </td>
            <td><span class="status-badge status-${hg.status}">${hg.status}</span></td>
            <td style="text-align:right" class="${pts>0?'pts-pos':pts<0?'pts-neg':'pts-zero'}">${pts>0?'+':''}${pts}</td>`;
          tbody.appendChild(tr);
        });
      }

      // Scoring system
      const sg = document.getElementById('scoring-grid');
      Object.entries(data.scoring).forEach(([,v]) => {
        const div = document.createElement('div');
        div.className = 'scoring-row';
        const cls = v.points > 0 ? 'pts-pos' : v.points < 0 ? 'pts-neg' : '';
        div.innerHTML = `<span class="scoring-label">${v.label}</span><span class="scoring-pts ${cls}">${v.points>0?'+':''}${v.points}</span>`;
        sg.appendChild(div);
      });
    }

    init();
  </script>
</body>
</html>
