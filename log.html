<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Episode Log · BB28 Fantasy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">BB<span>28</span></a>
    <a href="index.html">Leaderboard</a>
    <a href="draft.html">Draft</a>
    <a href="players.html">Players</a>
    <a href="log.html" class="active">Episode Log</a>
    <a href="admin.html" class="admin-link">Admin</a>
  </nav>

  <main class="inner">
    <h1 class="page-title">Episode Log</h1>
    <p class="page-subtitle">Points earned each week — auto-updated after episodes air</p>

    <div class="section-label">Broadcast Schedule</div>
    <div class="card" id="schedule-list" style="padding:6px 0;margin-bottom:36px;"></div>
    <p style="font-size:.72rem;color:var(--muted);margin:-24px 0 36px;font-family:var(--mono);letter-spacing:.5px;">
      // CBS announces episodes a few weeks out — this list grows as new dates are confirmed
    </p>

    <div class="section-label">Weekly Results</div>
    <div id="log-content"></div>
  </main>

  <script src="app.js"></script>
  <script>
    // Known episodes (from the official CBS schedule). Add rows as more are announced.
    const EPISODE_SCHEDULE = [
      { ep: 1,  title: 'Season Premiere',        date: '2026-07-09' },
      { ep: 2,  title: 'Big Brother: Unlocked',  date: '2026-07-10' },
      { ep: 3,  title: 'Episode 3',              date: '2026-07-12' },
      { ep: 4,  title: 'Episode 4',              date: '2026-07-15' },
      { ep: 5,  title: 'Episode 5',              date: '2026-07-16' },
      { ep: 6,  title: 'Episode 6',              date: '2026-07-19' },
      { ep: 7,  title: 'Episode 7',              date: '2026-07-22' },
      { ep: 8,  title: 'Episode 8',              date: '2026-07-23' },
      { ep: 9,  title: 'Big Brother: Unlocked',  date: '2026-07-24' },
      { ep: 10, title: 'Episode 10',             date: '2026-07-26' },
      { ep: 11, title: 'Episode 11',             date: '2026-07-29' },
      { ep: 12, title: 'Episode 12',             date: '2026-07-30' },
      { ep: 13, title: 'Episode 13',             date: '2026-08-02' },
    ];

    function renderSchedule() {
      const el = document.getElementById('schedule-list');
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const todayStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      el.innerHTML = EPISODE_SCHEDULE.map(e => {
        const d = new Date(e.date + 'T20:00:00');
        const state = e.date === todayStr ? 'tonight' : (e.date < todayStr ? 'aired' : 'upcoming');
        const chip = state === 'tonight' ? 'TONIGHT' : state === 'aired' ? 'AIRED' : 'UPCOMING';
        return `
          <div class="sched-row ${state}">
            <span class="sched-date">${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}</span>
            <span class="sched-title">Ep ${e.ep} — ${e.title}</span>
            <span class="sched-chip ${state}">${chip}</span>
          </div>`;
      }).join('');
    }

    async function init() {
      renderSchedule();
      const data = await loadData();
      const container = document.getElementById('log-content');

      if (!data.episodes || data.episodes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="icon">📅</span>
            <h3>No Scored Weeks Yet</h3>
            <p>Weekly results and points will appear here as they're logged after episodes air.</p>
          </div>`;
        return;
      }

      const sorted = [...data.episodes].sort((a,b) => b.week - a.week);
      sorted.forEach(ep => {
        const block = document.createElement('div');
        block.className = 'episode-block';
        const weekTotal = ep.events ? ep.events.reduce((s,e)=>s+e.points,0) : 0;
        block.innerHTML = `
          <div class="episode-header" onclick="toggleBlock(this)">
            <span class="episode-week">Week ${ep.week}</span>
            <span class="episode-date">${ep.airDate || ''}</span>
            <span style="color:var(--muted);font-size:.85rem;margin-left:auto;margin-right:12px;">${ep.events ? ep.events.length : 0} events</span>
            <span class="episode-chevron">▾</span>
          </div>
          <div class="episode-events">
            ${ep.events && ep.events.length
              ? ep.events.map(e => {
                  const owner = data.owners.find(o => o.id === (data.houseguests.find(h=>h.id===e.houseguestId)||{}).ownerId);
                  const hg = data.houseguests.find(h => h.id === e.houseguestId);
                  return `
                    <div class="event-row">
                      <span class="event-type ${e.type}">${formatType(e.type)}</span>
                      <div>
                        <div class="event-name">${hg ? hg.name : e.houseguestId}</div>
                        ${owner ? `<div class="event-owner" style="color:${owner.color}">${owner.name}'s team</div>` : ''}
                      </div>
                      <span class="event-pts ${e.points>0?'pts-pos':'pts-neg'}">${e.points>0?'+':''}${e.points}</span>
                    </div>`;
                }).join('')
              : '<p style="padding:16px 0;color:var(--muted);font-size:.9rem;">No events logged for this week.</p>'}
          </div>`;
        container.appendChild(block);
      });

      // Open the most recent week by default
      const first = container.querySelector('.episode-block');
      if (first) { first.classList.add('open'); }
    }

    function toggleBlock(header) {
      header.closest('.episode-block').classList.toggle('open');
    }

    function formatType(t) {
      const map = {
        hoh:'HOH', veto:'Veto', nominated:'Nominated', evicted:'Evicted',
        bbBlockbuster:'BB Blockbuster', wallHang:'Wall Hang', otev:'OTEV',
        bbComics:'BB Comics', safety:'Safety', pickedVeto:'Picked for Veto',
        takenOffBlock:'Off Block',
        savedSelf:'Self-Save',
        madeJury:'Jury', resurrection:'Resurrection',
        first:'Winner', second:'Runner-Up', third:'3rd Place', afh:'AFH'
      };
      return map[t] || t;
    }

    init();
  </script>
  <script type="module" src="chat.js"></script>
</body>
</html>
